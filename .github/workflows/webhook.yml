name: deploy from webhook
on:
  repository_dispatch:
    types: [webhook-deploy]
env:
  BASE_URL: ${{ secrets.BASE_URL }}

jobs:
  # ※既存の pullreq_build / pushed_build は消す or 別の workflow に分けるとスッキリ
  webhook_build:
    name: Build(from webhook)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: CI Cache
        uses: actions/cache@v4
        id: node_modules_cache_id
        env:
          cache-name: cache-node-modules
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.ref_name }}-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: ${{ steps.node_modules_cache_id.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Generate
        run: npm run generate
      - name: Validate kuroco_front.json
        run: |
          if [ -f "./.output/public/kuroco_front.json" ]; then
            echo "kuroco_front.json found"
            # JSON形式の検証
            if jq empty ./.output/public/kuroco_front.json; then
              echo "kuroco_front.json is valid JSON"
            else
              echo "Error: kuroco_front.json is not valid JSON"
              exit 1
            fi
          else
            echo "Error: kuroco_front.json not found in public folder"
            exit 1
          fi
      - name: Zip artifact for upload
        run: cd ./.output/public && zip ../../dist.zip . -r
      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}-${{ github.run_id }}
          path: dist.zip
          retention-days: 7
      - name: Webhook
        uses: diverta/workflow-webhook@v3
        with:
          webhook_url: "https://hasebe.g.kuroco.app/direct/menu/github/"
          webhook_secret: "7c0efe0b7bc988439947edb66434f459"
          data: '{"single_zip":"1","domain":"hasebe.g.kuroco-front.app", "repository":"${{ github.repository }}", "run_id":"${{ github.run_id }}", "hash":"${{ github.sha }}"}'